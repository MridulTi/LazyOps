id: batch-start-linux-ami-patch-automation

name: Batch Start Linux AMI Patch Automation

description: Start SSM automation for AMI patching across ASGs listed in a file. Required env: SSM_AUTOMATION_DOCUMENT, AUTOMATION_ASSUME_ROLE_ARN (optional), AWS_REGION (optional), IAM_INSTANCE_PROFILE_NAME (optional).

runtime: bash

entrypoint: script.sh

version: 1.0.0

inputs:
  - name: asg-list
    required: true
